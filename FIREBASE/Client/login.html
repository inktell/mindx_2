<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Firebase Marketplace</title>
    <link rel="stylesheet" href="./auth.css">
</head>
<body>
    <div id="matrix-bg"></div>
    
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>🔐 ĐĂNG NHẬP</h1>
                <p>Truy cập tài khoản của bạn</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email..." required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
                </div>
                
                <button type="submit" class="btn-submit">🔓 Đăng Nhập</button>
            </form>
            
            <div class="auth-footer">
                <p>Chưa có tài khoản? <a href="signup.html">Đăng ký ngay</a></p>
                <a href="index.html" class="btn-back">← Quay lại trang chủ</a>
            </div>
            <div class="auth-action-panel">
                <p>Bạn có thể chọn vào website ngay hoặc ở lại xem nội dung giới thiệu trước.</p>
                <div class="auth-action-links">
                    <a href="index.html?mode=site" class="btn-action">Đi đến website</a>
                    <a href="index.html?mode=info" class="btn-action secondary">Ở lại xem thông tin</a>
                </div>
            </div>
            
            <div id="notification" class="notification"></div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-functions.js"></script>

    <script type="module" src="./auth.js"></script>
</body>
</html>
