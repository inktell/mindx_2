<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng - Firebase Marketplace</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="matrix-bg"></div>
    <div class="app">
        <header class="header">
            <div class="header-wrapper">
                <div class="logo">
                    <span class="logo-text">💳 MARKETPLACE</span>
                </div>
                <nav class="header-nav">
                    <a href="index.html" class="nav-link">🏠 Trang chủ</a>
                    <a href="order.html" class="nav-link">📦 Đơn hàng</a>
                    <a href="login.html" class="nav-link">🔐 Đăng nhập</a>
                    <a href="signup.html" class="nav-link">📝 Đăng ký</a>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <section class="orders-page page-content active">
                <div class="orders-container">
                    <h1 class="page-title">📦 Đơn hàng của tôi</h1>
                    <p style="margin-bottom:16px; color:#5f4a37;">Đây là trang đơn hàng riêng. Đăng nhập để xem chi tiết đơn hàng của bạn.</p>
                    <div id="orderList" class="orders-grid">
                        <p style="grid-column:1/-1; text-align:center; color:#888;">Đang tải đơn hàng...</p>
                    </div>
                </div>
            </section>
        </main>

        <div id="notification" class="notification"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-functions.js"></script>

    <script type="module" src="./order.js"></script>
</body>
</html>
