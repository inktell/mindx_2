<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">NHÀ HÀNG</div>

            <button class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <ul class="nav-menu">
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Thực đơn</a></li>
                <li><a href="#">Đặt bàn</a></li>
                <li><a href="#">Liên hệ</a></li>
            </ul>
        </div>
    </nav>

    <section class="booking-section">
        <h2>Đặt Chỗ Ngay</h2>

        <div class="time-grid">
            <div class="time-slot">08:00 AM</div>
            <div class="time-slot">10:00 AM</div>
            <div class="time-slot">12:00 PM</div>
            <div class="time-slot">02:00 PM</div>
            <div class="time-slot">04:00 PM</div>
            <div class="time-slot">06:00 PM</div>
        </div>

        <form id="booking-form" class="booking-form">
            <input type="email" placeholder="Email của bạn" required>
            <input type="tel" placeholder="Số điện thoại" pattern="[0-9]{10}" required>
            <input type="date" required>
            <button type="submit">Xác nhận đặt chỗ</button>
        </form>
    </section>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmModalLabel">Xác Nhận Thông Tin Đặt Bàn</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="summary-item"><strong>Email:</strong> <span id="summary-email"></span></div>
        <div class="summary-item"><strong>Số điện thoại:</strong> <span id="summary-phone"></span></div>
        <div class="summary-item"><strong>Thời gian:</strong> <span id="summary-time"></span></div>
        <p class="mt-3 text-muted">* Vui lòng kiểm tra kỹ trước khi gửi yêu cầu.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Chỉnh sửa</button>
        <button type="button" class="btn btn-primary" id="final-submit">Xác nhận gửi</button>
      </div>
    </div>
  </div>
</div>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>

</html>
