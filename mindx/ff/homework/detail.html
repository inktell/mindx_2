<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* CSS Reset & Cơ bản */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Hình nền mờ phía sau */
        #background-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background-size: cover;
            background-position: center top;
            z-index: -1;
            filter: brightness(0.4);
        }

        /* Nội dung chính */
        .container {
            padding: 50px 5%;
            padding-top: 100px;
            max-width: 1200px;
        }

        .back-btn {
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .back-btn:hover { background: #e50914; }

        #title {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #rating {
            font-size: 1.2rem;
            color: #46d369; /* Màu xanh giống Netflix */
            font-weight: bold;
            display: block;
            margin-bottom: 20px;
        }

        #overview {
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 700px;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Vùng chứa Video */
        .video-section {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #000;
        }

        #video-player {
            aspect-ratio: 16 / 9;
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="background-image"></div>

    <div class="container">
        <a href="browse.html" class="back-btn">← Quay lại</a>

        <h1 id="title">Đang tải...</h1>
        <span id="rating"></span>
        <p id="overview"></p>

        <div class="video-section">
            <div id="video-player">
                </div>
        </div>
    </div>

    <script src="scripts/detail.js"></script>
</body>
</html>
