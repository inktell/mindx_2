<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Firebase Marketplace</title>
    <link rel="stylesheet" href="./auth.css">
</head>
<body>
    
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>📝 ĐĂNG KÝ</h1>
                <p>Tạo tài khoản mới</p>
            </div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Tên</label>
                    <input type="text" id="name" placeholder="Nhập tên..." required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email..." required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" placeholder="Nhập số điện thoại..." required>
                </div>
                
                <div class="form-group">
                    <label for="address">Địa chỉ</label>
                    <input type="text" id="address" placeholder="Nhập địa chỉ..." required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
                </div>
                
                <div class="form-group">
                    <label for="password-confirm">Xác nhận mật khẩu</label>
                    <input type="password" id="password-confirm" placeholder="Xác nhận mật khẩu..." required>
                </div>
                
                <button type="submit" class="btn-submit">✅ Đăng Ký</button>
            </form>
            
            <div class="auth-footer">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
                <a href="index.html" class="btn-back">← Quay lại trang chủ</a>
            </div>
            <div class="auth-action-panel">
                <p>Bạn có thể vào website nâng cao hoặc dừng lại xem trước nội dung.</p>
                <div class="auth-action-links">
                    <a href="index.html?mode=site" class="btn-action">Đi đến website</a>
                    <a href="index.html?mode=info" class="btn-action secondary">Ở lại xem thông tin</a>
                </div>
            </div>
            
            <div id="notification" class="notification"></div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-functions.js"></script>

    <script type="module" src="./auth.js"></script>
</body>
</html>
