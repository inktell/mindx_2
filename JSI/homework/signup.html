<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="card auth-card">
            <h2>Signup</h2>
            <form id="signup-form">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="Email" required>

                <label for="signup-password">Create password</label>
                <input type="password" id="signup-password" placeholder="Password" minlength="6" required>

                <label for="signup-confirm-password">Confirm password</label>
                <input type="password" id="signup-confirm-password" placeholder="Confirm password" minlength="6" required>

                <button type="submit" class="primary-button">Signup</button>
                <p class="switch-text">Already have an account? <a href="login.html">Login</a></p>

                <div class="divider"><span>Or</span></div>
                <button type="button" class="social-button facebook" id="signup-facebook">Signup with Facebook</button>
                <button type="button" class="social-button google" id="signup-google">Signup with Google</button>
            </form>
        </div>
    </div>

    <div class="status-panel" id="status-panel">
        <p id="status-message">Bạn chưa đăng nhập.</p>
        <button type="button" id="logout-button" class="secondary-button hidden">Logout</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="test.js"></script>
</body>
</html>
