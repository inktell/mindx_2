<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chính</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .home-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .navbar-content {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .user-email {
            font-size: 0.95rem;
            color: var(--text);
            font-weight: 500;
        }

        .user-status {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .main-content {
            flex: 1;
            padding: 40px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-card {
            background: var(--card);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
            text-align: center;
            max-width: 600px;
        }

        .welcome-card h2 {
            font-size: 2rem;
            margin: 0 0 16px;
            color: var(--primary);
        }

        .welcome-card p {
            font-size: 1.1rem;
            color: var(--text);
            margin: 0 0 24px;
            line-height: 1.6;
        }

        .welcome-card .user-email-display {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 32px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="home-page">
        <div class="navbar">
            <h1>SPGK Dashboard</h1>
            <div class="navbar-content">
                <div class="user-info">
                    <span class="user-email" id="navbar-email">Loading...</span>
                    <span class="user-status">Đã đăng nhập</span>
                </div>
                <button type="button" id="logout-button" class="primary-button" style="width: auto; margin: 0; padding: 10px 20px;">Logout</button>
            </div>
        </div>

        <div class="main-content">
            <div class="welcome-card">
                <h2>Chào mừng bạn!</h2>
                <p>Bạn đã đăng nhập thành công vào hệ thống.</p>
                <div class="user-email-display" id="welcome-email">Email: Loading...</div>
                <p style="color: var(--muted); font-size: 0.95rem;">Đây là trang chính của ứng dụng.</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="test.js"></script>
</body>
</html>
