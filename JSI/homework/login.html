<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="card auth-card">
            <h2>Login</h2>
            <form id="login-form">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="Email" required>

                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Password" minlength="6" required>

                <button type="submit" class="primary-button">Login</button>
                <p class="switch-text">Don't have an account? <a href="signup.html">Signup</a></p>

                <div class="divider"><span>Or</span></div>
                <button type="button" class="social-button facebook" id="login-facebook">Login with Facebook</button>
                <button type="button" class="social-button google" id="login-google">Login with Google</button>
            </form>
        </div>
    </div>

    <div class="status-panel" id="status-panel">
        <p id="status-message">Bạn chưa đăng nhập.</p>
        <button type="button" id="logout-button" class="secondary-button hidden">Logout</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="test.js"></script>
</body>
</html>
